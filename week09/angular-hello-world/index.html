<!DOCTYPE html>
<html ng-app="myApp">
<head>
    <title>AngularJS Hello World</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 1.5rem;
        }
        input {
            border-radius: 25px;
            border: 2px solid #ddd;
            padding: 0.5rem 1rem;
            font-size: 1.1rem;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #667eea;
            outline: none;
        }
        .greeting {
            font-size: 1.5rem;
            margin: 1rem 0;
            transition: all 0.3s;
        }
        .btn-custom {
            margin: 0.5rem;
            border-radius: 25px;
            padding: 0.5rem 1.5rem;
            transition: all 0.3s;
        }
        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .color-picker {
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container" ng-controller="HelloController">
        <h1>Hello World with AngularJS</h1>
        <input type="text" ng-model="name" placeholder="Enter your name" class="form-control mb-3">
        <p class="greeting" ng-style="{color: greetingColor, 'text-transform': textTransform}">Hello {{name}}!</p>
        
        <div>
            <button class="btn btn-primary btn-custom" ng-click="toggleCase()">Toggle Case</button>
            <button class="btn btn-success btn-custom" ng-click="randomColor()">Random Color</button>
            <button class="btn btn-warning btn-custom" ng-click="reset()">Reset</button>
        </div>
        
        <div class="color-picker mt-3">
            <label>Choose Greeting Color:</label>
            <input type="color" ng-model="greetingColor" class="form-control form-control-color">
        </div>
        
        <div class="mt-3">
            <p ng-show="name !== 'World'">Welcome, {{name}}! You've made it interactive!</p>
        </div>
    </div>

    <script>
        var app = angular.module('myApp', []);
        app.controller('HelloController', function($scope) {
            $scope.name = 'World';
            $scope.greetingColor = '#333';
            $scope.textTransform = 'none';
            
            $scope.toggleCase = function() {
                $scope.textTransform = $scope.textTransform === 'uppercase' ? 'none' : 'uppercase';
            };
            
            $scope.randomColor = function() {
                var colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD', '#98D8C8'];
                $scope.greetingColor = colors[Math.floor(Math.random() * colors.length)];
            };
            
            $scope.reset = function() {
                $scope.name = 'World';
                $scope.greetingColor = '#333';
                $scope.textTransform = 'none';
            };
        });
    </script>
</body>
</html>
